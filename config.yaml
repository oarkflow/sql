source:
    type: "csv"
    file: "input.csv"

destination:
    type: "postgresql"
    host: "localhost"
    port: 5432
    driver: "postgres"
    username: "postgres"
    password: "postgres"
    database: "mydb"

tables:
    - old_name: "input.csv"           # For file sources, this name is not critical.
      new_name: "my_table"          # For file destinations, this is the target file.
      migrate: true                   # Ignored for file loaders.
      batch_size: 100
      truncate_destination: true      # If true, clears the file before writing.
      auto_create_table: true        # Not used for file loaders.
      key_value_table: true
      key_field: "key"
      value_field: "value"
      extra_values:
          user_id: "id"
      include_fields:
          - "id"
      exclude_fields:
          - "Name"
          - "Age"
          - "Country"
