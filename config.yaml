# Example for CSV to PostgreSQL ETL with auto table creation:
source:
    type: "csv"
    file: "input.csv"

destination:
    type: "postgresql"
    host: "localhost"
    port: 5432
    driver: "postgres"
    username: "postgres"
    password: "postgres"
    database: "mydb"

tables:
    - old_name: "input.csv"
      new_name: "my_table"
      migrate: true
      batch_size: 100
      truncate_destination: true
      auto_create_table: true
      mapping:
          name: "eval.{{Name + ' (migrated)'}}"
          age: Age
          country: Country

